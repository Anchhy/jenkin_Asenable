---
- name: Deploy personal portfolio
  hosts: staging
  become: yes
  vars:
    deploy_path: "{{ deploy_path | default('/var/www/html/et_anchhy') }}"

  tasks:
    - name: Create deployment directory
      file:
        path: "{{ deploy_path }}"
        state: directory
        mode: '0755'
        owner: www-data
        group: www-data

    - name: Sync portfolio files
      copy:
        src: "{{ item }}"
        dest: "{{ deploy_path }}/"
        mode: '0644'
        owner: www-data
        group: www-data
      loop:
        - "index.html"
        - "*.css"
        - "*.js"
      ignore_errors: yes

    - name: Copy entire build directory if exists
      synchronize:
        src: "./dist/"
        dest: "{{ deploy_path }}/"
        delete: no
        recursive: yes
      delegate_to: localhost
      ignore_errors: yes
